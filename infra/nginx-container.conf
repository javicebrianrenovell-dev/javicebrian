# =============================================================
# nginx — contenedor Dokploy para javicebrian.es (Astro estático)
# =============================================================
# Este archivo reemplaza al antiguo nginx-javicebrian.conf (nginx
# nativo del VPS). Aquí no gestionamos SSL ni reverse proxy al
# contact-server: de eso se encarga Traefik de Dokploy a nivel de
# la red Docker. nginx solo sirve los HTML estáticos y aplica los
# 301 de preservación SEO.
# =============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Detrás de Traefik (que termina SSL): que los 301 sean relativos
    # para que el navegador conserve el scheme https original.
    absolute_redirect off;
    port_in_redirect off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # =========================================================
    # 301 — POSTS WordPress → /blog/<slug>/
    # =========================================================
    # 12 reglas explícitas. Cada post de WP vivía en /<slug>/ y
    # ahora vive en /blog/<slug>/. Los listados antiguos se
    # redirigen al índice del blog.

    location = /como-la-inteligencia-artificial-generativa-revoluciona-las-estrategias-de-comunicacion-empresarial/ { return 301 /blog/como-la-inteligencia-artificial-generativa-revoluciona-las-estrategias-de-comunicacion-empresarial/; }
    location = /la-importancia-de-la-comunicacion-de-calidad-en-la-sostenibilidad-empresarial/ { return 301 /blog/la-importancia-de-la-comunicacion-de-calidad-en-la-sostenibilidad-empresarial/; }
    location = /ventajas-de-la-automatizacion-y-la-ia-para-la-productividad-transformando-la-comunicacion-sostenible/ { return 301 /blog/ventajas-de-la-automatizacion-y-la-ia-para-la-productividad-transformando-la-comunicacion-sostenible/; }
    location = /freepik-herramienta-agencias-comunicacion/ { return 301 /blog/freepik-herramienta-agencias-comunicacion/; }
    location = /formacion-comunicacion_inteligencia-artificial/ { return 301 /blog/formacion-comunicacion_inteligencia-artificial/; }
    location = /equipo-comunicacion-productivo/ { return 301 /blog/equipo-comunicacion-productivo/; }
    location = /comunicacion-especializada-sostenibilidad/ { return 301 /blog/comunicacion-especializada-sostenibilidad/; }
    location = /nuevos-desafios-comunicacion/ { return 301 /blog/nuevos-desafios-comunicacion/; }
    location = /discurso-ambiental-en-la-politica-un-compromiso-necesario-contra-el-cambio-climatico-y-el-negacionismo/ { return 301 /blog/discurso-ambiental-en-la-politica-un-compromiso-necesario-contra-el-cambio-climatico-y-el-negacionismo/; }
    location = /consultoria-de-automatizacion-la-necesaria-transformacion-de-los-procesos-de-las-agencias-de-comunicacion-en-2025/ { return 301 /blog/consultoria-de-automatizacion-la-necesaria-transformacion-de-los-procesos-de-las-agencias-de-comunicacion-en-2025/; }
    location = /agencia-de-agentes-ia-y-no-code-al-servicio-de-la-comunicacion/ { return 301 /blog/agencia-de-agentes-ia-y-no-code-al-servicio-de-la-comunicacion/; }
    location = /implementacion-ia-empresas/ { return 301 /blog/implementacion-ia-empresas/; }

    # =========================================================
    # 301 — PÁGINAS con slug largo SEO antiguo
    # =========================================================
    location = /blog-director-comunicacion/ { return 301 /blog/; }
    location = /blog-director-comunicacion-valencia/ { return 301 /blog/; }
    location = /contacto-director-comunicacion-valencia/ { return 301 /contacto/; }
    location = /terms-and-conditions/ { return 301 /aviso-legal/; }

    # =========================================================
    # 301 — Categorías, tags y author (genéricos)
    # =========================================================
    location ~ ^/category/.+$ { return 301 /blog/; }
    location ~ ^/tag/.+$      { return 301 /blog/; }
    location ~ ^/author/.+$   { return 301 /quien-soy/; }

    # =========================================================
    # API contacto — proxy interno a la app contact-server de Dokploy
    # =========================================================
    # Traefik puede enrutar /api directamente a la otra app por host,
    # pero si se decide hacerlo desde nginx, esta es la regla:
    # location /api/contact {
    #     proxy_pass http://javicebrian-contact:3001/api/contact;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 30s;
    # }

    # =========================================================
    # Estáticos — caché agresiva en assets versionados
    # =========================================================
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(ico|png|svg|webp|jpg|jpeg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Alias: muchas herramientas SEO buscan /sitemap.xml por defecto.
    location = /sitemap.xml        { return 301 /sitemap-index.xml; }
    location = /sitemap-index.xml { try_files $uri =404; }
    location = /sitemap-0.xml      { try_files $uri =404; }
    location = /rss.xml            { try_files $uri =404; }
    location = /robots.txt         { try_files $uri =404; }

    # =========================================================
    # Fallback — sirve HTML con trailingSlash forzado por Astro
    # =========================================================
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    error_page 404 /404/index.html;
}
