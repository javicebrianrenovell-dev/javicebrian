# =============================================================
# Configuración nginx para javicebrian.es
# Servidor: VPS Hostinger Ubuntu 24.04
# Stack: Astro estático + microservicio Node de contacto
# =============================================================
#
# Ubicación recomendada: /etc/nginx/sites-available/javicebrian.es
# Activar:
#   ln -s /etc/nginx/sites-available/javicebrian.es /etc/nginx/sites-enabled/
#   nginx -t
#   systemctl reload nginx
#
# SSL con Let's Encrypt:
#   apt install -y certbot python3-certbot-nginx
#   certbot --nginx -d javicebrian.es -d www.javicebrian.es
# =============================================================

# Redirección HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name javicebrian.es www.javicebrian.es;
    return 301 https://javicebrian.es$request_uri;
}

# Redirección www → sin www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.javicebrian.es;

    # Las certificaciones las añadirá certbot automáticamente
    # ssl_certificate /etc/letsencrypt/live/javicebrian.es/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/javicebrian.es/privkey.pem;

    return 301 https://javicebrian.es$request_uri;
}

# Servidor principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name javicebrian.es;

    root /var/www/javicebrian.es;
    index index.html;

    # Logs
    access_log /var/log/nginx/javicebrian.es-access.log;
    error_log  /var/log/nginx/javicebrian.es-error.log warn;

    # Gzip + compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # =========================================================
    # REDIRECCIONES 301 — preservación SEO de URLs antiguas
    # =========================================================

    # Listado de blog antiguo con slug largo SEO → /blog/
    location = /blog-director-comunicacion-valencia/ { return 301 /blog/; }
    location = /blog-director-comunicacion-valencia  { return 301 /blog/; }

    # Listado /blog-director-comunicacion/ (cornerstone antiguo) → /blog/
    location = /blog-director-comunicacion/ { return 301 /blog/; }
    location = /blog-director-comunicacion  { return 301 /blog/; }

    # Contacto antiguo con slug largo → /contacto/
    location = /contacto-director-comunicacion-valencia/ { return 301 /contacto/; }
    location = /contacto-director-comunicacion-valencia  { return 301 /contacto/; }

    # Términos en inglés (huérfana desde 2022) → aviso legal
    location = /terms-and-conditions/ { return 301 /aviso-legal/; }
    location = /terms-and-conditions  { return 301 /aviso-legal/; }

    # Eliminar slash trailing inconsistencias
    # (Astro genera siempre con trailing slash, así que añadimos)

    # =========================================================
    # API — proxy al microservicio de contacto en :3001
    # =========================================================

    location /api/contact {
        proxy_pass http://127.0.0.1:3001/api/contact;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # =========================================================
    # ARCHIVOS ESTÁTICOS — Astro build
    # =========================================================

    # Caché agresiva para assets versionados
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /blog-images/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Sitemap y RSS
    location = /sitemap-index.xml { try_files $uri =404; }
    location = /sitemap-0.xml      { try_files $uri =404; }
    location = /rss.xml            { try_files $uri =404; }
    location = /robots.txt         { try_files $uri =404; }

    # Favicons
    location ~* \.(ico|png|svg|webp|jpg|jpeg)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Catch-all: HTML estáticos de Astro con trailing slash
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    # 404 personalizado de Astro
    error_page 404 /404.html;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
